# Tiny Tapeout project information
project:
  title:        "programmable_Pipeline-RISV-V"      # Project title
  author:       "prem"      # Your name
  discord:      "prem_42503"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Zero to ASIC demo project"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "4x4"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_prem_pipeline_test"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_prem_pipeline_test.v"
    - "ALU.v" 
    - "clk.v" 
    - "Control_Unit.v"
    - "DataMem.v" 
    - "EX_stage.v" 
    - "Hazard_Unit.v"
    - "IF_ID_stage.v" 
    - "imm.v" 
    - "Instruction_Mem.v"
    - "Mem_stage.v"
    - "PC_incre.v"
    - "PCSelect.v"
    - "pipeline.v" 
    - "Reg_File.v" 
    - "Write_back.v"
    - "WriteBack_stage.v"
    - "uart.v"
    - "uart_bootloader.v"
    - "spi.v"
    - "gpio.v"
    - "uart0.v"


# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: "uart1_rx"
  ui[4]: "uart2_rx"
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "uart1_tx"
  uo[1]: "uart2_tx"
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "spi1_cs_n"
  uio[1]: ""
  uio[2]: "spi2_mosi"
  uio[3]: "spi2_sclk"
  uio[4]: "spi2_cs_n"
  uio[5]: ""
  uio[6]: ""
  uio[7]: "spi2_miso"

# Do not change!
yaml_version: 6
